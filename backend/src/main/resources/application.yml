server:
  port: 8080

spring:
  application:
    name: icareforyou-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/icareforyou
    username: icare
    password: icare
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

icareforyou:
  security:
    jwt:
      issuer: icareforyou
      audience: icareforyou-web
      # Change this in production (store as env var in real deployments)
      secret: change-me-to-a-strong-secret-at-least-32-chars
      accessTokenTtlSeconds: 900
      refreshTokenTtlSeconds: 2592000

